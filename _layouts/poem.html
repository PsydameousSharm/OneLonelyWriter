---
layout: default
---

<article class="poem-page container">
  <h1>{{ page.title }}</h1>

  <div class="poem-meta">
    <span>{{ page.author }}</span>
    <span>{{ page.date | date: "%B %-d, %Y" }}</span>
  </div>

  {% if page.warnings %}
    <div class="warning-list">
      {% for warning in page.warnings %}
        <span class="warning-pill">{{ warning }}</span>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </div>
  {% endif %}

  <div class="poem-content">
    {{ content }}
  </div>

  <p class="poem-back">
    <a href="{{ '/poems/' | relative_url }}">← Back to Poems</a>
  </p>
</article>
