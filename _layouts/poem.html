---
layout: default
---

<article class="card poem-card">
  <h1>{{ page.title }}</h1>

  <div class="poem-meta">
    <span>By {{ page.author }}<br></span>
    <span>Published on {{ page.date | date: "%B %-d, %Y" }}</span>
  </div>
  <br><br>
  <div class="poem-content">
    {{ content }}
  </div>
  <a class="button primary" href="{{ '/poems/' | relative_url }}">Back to Poems</a>
</article>
