<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">Nova<span>Site</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
        <a href="settings.html">Settings</a>
        <a href="contact.html">Contact</a>
        <a href="signout.html">Sign Out</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container panel form-wrap">
      <div class="kicker">Ready to continue writing?</div>
      <h2>Log in</h2>
      <p>Template form for a static site.</p>

      <form class="form-grid" action="#" method="post">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="name@example.com">
        </div>

        <div class="field-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••">
        </div>

        <div class="checks">
          <label class="check-item">
            <input type="checkbox">
            Remember me
          </label>
        </div>

        <div class="actions">
          <button class="button primary" type="submit">Log In</button>
          <a class="button secondary" href="signup.html">Create Account</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 OneLonelyWriter</div>
  </footer>
</body>
</html>
