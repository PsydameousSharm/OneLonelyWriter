<div class="container">
  <h1>Poem Submission</h1>

  <form
  action="https://formspree.io/f/mjgqrwej"
  method="POST"
>
  <label>
    Email Address:
    <input type="email" name="email">
  </label>
  <label>
    Title:
    <textarea name="Title" maxlength="100" height= 40px ></textarea>
  </label>
  <label>
    Penname:
    <textarea name="penname" maxlength="50" height= 40px></textarea>
  </label>
  <label>
    Warnings(separated by commas):
    <textarea name="warnings" maxlength="100" height= 40px></textarea>
  </label>
  <label>
    Short summary:
    <textarea name="summary" maxlength="100" height= 40px></textarea>
  </label>
  <label>
    Poem:
    <textarea name="poem" maxlength="2000"></textarea>
  </label>
  <button type="submit" class="button primary">Send</button>
</form>
    
</div>
