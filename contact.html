<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">Nova<span>Site</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
        <a href="settings.html">Settings</a>
        <a class="active" href="contact.html">Contact</a>
        <a href="signout.html">Sign Out</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container panel form-wrap">
      <div class="kicker">Get in touch</div>
      <h2>Contact form</h2>
      <p>Fix this later</p>

      <form class="form-grid" action="#" method="post">
        <div class="row">
          <div class="field-group">
            <label for="contact-name">Name</label>
            <input id="contact-name" type="text" placeholder="Your name">
          </div>
          <div class="field-group">
            <label for="contact-email">Email</label>
            <input id="contact-email" type="email" placeholder="name@example.com">
          </div>
        </div>

        <div class="field-group">
          <label for="subject">Subject</label>
          <input id="subject" type="text" placeholder="How can we help?">
        </div>

        <div class="field-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Write your message here"></textarea>
        </div>

        <div class="actions">
          <button class="button primary" type="submit">Send Message</button>
          <a class="button secondary" href="index.html">Back Home</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 One Lonely Writer</div>
  </footer>
</body>
</html>
