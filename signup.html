<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">Nova<span>Site</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a class="active" href="signup.html">Sign Up</a>
        <a href="settings.html">Settings</a>
        <a href="contact.html">Contact</a>
        <a href="signout.html">Sign Out</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container panel form-wrap">
      <div class="kicker">Join now</div>
      <h2>Create account</h2>
      <p>Sign up to submit your own poems</p>

      <form class="form-grid" action="#" method="post">
        <div class="row">
          <div class="field-group">
            <label for="first-name">First name</label>
            <input id="first-name" type="text" placeholder="First name">
          </div>
          <div class="field-group">
            <label for="last-name">Last name</label>
            <input id="last-name" type="text" placeholder="Last name">
          </div>
          <div class="field-group">
            <label for="nickname">Public Psudonym or Name</label>
            <input id="nickname" type="text" placeholder="Psudonym"
        </div>

        <div class="field-group">
          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" placeholder="uwu@obamachan.com">
        </div>

        <div class="row">
          <div class="field-group">
            <label for="signup-password">Password</label>
            <input id="signup-password" type="password" placeholder="Create a password">
          </div>
          <div class="field-group">
            <label for="confirm-password">Confirm password</label>
            <input id="confirm-password" type="password" placeholder="Repeat password">
          </div>
        </div>

        <div class="checks">
          <label class="check-item">
            <input type="checkbox">
            I agree to the terms
          </label>
        </div>

        <div class="actions">
          <button class="button primary" type="submit">Sign Up</button>
          <a class="button secondary" href="login.html">Back to Login</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 One Lonely Writer</div>
  </footer>
</body>
</html>
